spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/weekly_commits}
    username: ${DATABASE_USERNAME:app}
    password: ${DATABASE_PASSWORD:app_local_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
