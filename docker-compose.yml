version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: weekly-commit-db
    environment:
      POSTGRES_DB: weekly_commits
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_local_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
