spring:
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/weekly_commits}
    username: ${DATABASE_USERNAME:app}
    password: ${DATABASE_PASSWORD:app_local_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  base-url: ${ANTHROPIC_BASE_URL:}
  model: ${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
  max-tokens: 1024

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
