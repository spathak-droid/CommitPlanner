spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

anthropic:
  api-key: ""
  base-url: ""
  model: "test-model"
  max-tokens: 100

app:
  auth:
    secret: "test-secret-key-for-unit-tests-only"
